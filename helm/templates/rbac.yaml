apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "devnopes.name" . }}
  namespace: {{ .Values.job.namespace }}
  labels:
    {{- include "devnopes.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "devnopes.name" . }}
  labels:
    {{- include "devnopes.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - pods
      - services
      - endpoints
      - events
      - namespaces
      - resourcequotas
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources:
      - pods/log
    verbs: ["get"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - daemonsets
      - replicasets
      - statefulsets
    verbs: ["get", "list"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources:
      - customresourcedefinitions
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "devnopes.name" . }}
  labels:
    {{- include "devnopes.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "devnopes.name" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "devnopes.name" . }}
    namespace: {{ .Values.job.namespace }}
