name: CI — Build, Test and Push

on:
  push:
    branches: [main]
    paths:
      - "diagnose.py"
      - "Dockerfile"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/ci.yml"
      - "helm/**"
      - "k8s/**"
    tags:
      - "v*"       # e.g. v1.0.0 — triggers a release build and push

# Required GitHub secrets:
#   DOCKERHUB_USERNAME  — your Docker Hub username
#   DOCKERHUB_TOKEN     — Docker Hub access token

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/devnopes
  CI_IMAGE: devnopes:ci-test

jobs:

  # ── Stage 1: Verify ─────────────────────────────────────────────────────────
  # Fast checks before spending time on a Docker build.
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.4"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Verify lockfile
        run: uv lock

      - name: Install dependencies
        run: uv sync --frozen --no-dev

      - name: Lint Helm chart
        run: helm lint ./helm

  # ── Stage 2: Build ──────────────────────────────────────────────────────────
  # Builds the Docker image once and exports it as an artifact for reuse.
  build:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.CI_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export image artifact
        run: docker save ${{ env.CI_IMAGE }} | gzip > /tmp/image.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar.gz
          retention-days: 1

  # ── Stage 3a: Scan ──────────────────────────────────────────────────────────
  # Vulnerability scan — runs in parallel with test.
  scan:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # required to upload Trivy SARIF
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load image
        run: docker load < /tmp/image.tar.gz

      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.CI_IMAGE }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"          # never fail the build — report only

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ── Stage 3b: Test ──────────────────────────────────────────────────────────
  # Integration test against a real kind cluster — runs in parallel with scan.
  test:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load image
        run: docker load < /tmp/image.tar.gz

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: kind

      - name: Wait for CoreDNS to be ready
        run: |
          kubectl -n kube-system wait \
            --for=condition=available deployment/coredns \
            --timeout=90s

      - name: Load image into kind
        run: kind load docker-image ${{ env.CI_IMAGE }} --name kind

      - name: Deploy devnopes
        run: |
          kubectl delete job devnopes -n kube-system --ignore-not-found=true
          helm template devnopes ./helm \
            --namespace kube-system \
            --set image.repository=devnopes \
            --set image.tag=ci-test \
            --set image.pullPolicy=Never \
            --set cniConfMount.enabled=false \
          | kubectl apply -f -

      - name: Wait for job to finish
        run: |
          kubectl wait -n kube-system job/devnopes \
            --for=condition=complete \
            --timeout=120s \
          || kubectl wait -n kube-system job/devnopes \
            --for=condition=failed \
            --timeout=10s

      - name: Show output and assert healthy verdict
        run: |
          LOGS=$(kubectl logs -n kube-system -l job-name=devnopes --tail=200)
          echo "$LOGS"
          echo "$LOGS" | grep "INFRASTRUCTURE IS HEALTHY"

  # ── Stage 4: Release ─────────────────────────────────────────────────────────
  # Pushes Docker image + publishes Helm chart. Only runs on version tags.
  release:
    needs: [scan, test]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to push Helm chart to gh-pages
    steps:
      - uses: actions/checkout@v4

      - name: Set chart version from tag
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          sed -i "s/^version: .*/version: ${VERSION}/" helm/Chart.yaml
          sed -i "s/^appVersion: .*/appVersion: \"${VERSION}\"/" helm/Chart.yaml

      - uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load image
        run: docker load < /tmp/image.tar.gz

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image
        run: |
          docker tag ${{ env.CI_IMAGE }} ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          docker tag ${{ env.CI_IMAGE }} ${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          docker push ${{ env.IMAGE_NAME }}:latest

      - name: Publish Helm chart to GitHub Pages
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          cp README.md helm/README.md
          helm package ./helm --destination /tmp/helm-pkg

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          git checkout gh-pages

          cp /tmp/helm-pkg/devnopes-${VERSION}.tgz .
          helm repo index . --url https://seab4ng.github.io/Devnopes

          git add devnopes-${VERSION}.tgz index.yaml
          git commit -m "Release Helm chart v${VERSION}"
          git push origin gh-pages
