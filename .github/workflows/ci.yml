name: CI — Build, Test and Push

on:
  push:
    branches: [main]
    paths:
      - "diagnose.py"
      - "Dockerfile"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/ci.yml"
    tags:
      - "v*"       # e.g. v1.0.0 — triggers a release build and push

# Required GitHub secrets:
#   DOCKERHUB_USERNAME  — your Docker Hub username
#   DOCKERHUB_TOKEN     — Docker Hub access token
#                         (Docker Hub → Account Settings → Security → New Access Token)
#
# Image is pushed to:  <DOCKERHUB_USERNAME>/devnopes:<tag>  and  :latest

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/devnopes
  CI_IMAGE: devnopes:ci-test

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # required for SARIF upload to GitHub Security tab

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Python dependency management via uv ──────────────────────────────────
      # uv is a fast Python package manager (written in Rust).
      # It generates uv.lock (the lockfile) and installs from it.
      # This step runs in CI — NOT inside the Docker container at runtime.
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.4"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Generate / verify lockfile
        # uv lock is idempotent: no-op if pyproject.toml hasn't changed.
        # Generates uv.lock on first run; verifies it on subsequent runs.
        run: uv lock

      - name: Install dependencies (CI verification)
        # Installs exactly the versions pinned in uv.lock — no surprises.
        # This also smoke-tests that the lockfile is valid.
        run: uv sync --frozen --no-dev

      # ── Docker: build ────────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (load into local daemon)
        # Always built and loaded locally — used by the integration test below.
        # On tag pushes this same image is tagged and pushed to Docker Hub.
        uses: docker/build-push-action@v6
        with:
          context: .          push: false
          load: true
          tags: ${{ env.CI_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Security scan ────────────────────────────────────────────────────────
      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.CI_IMAGE }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"   # report only — do not fail the build

      - name: Upload scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      # ── Integration test ─────────────────────────────────────────────────────
      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: kind

      - name: Wait for CoreDNS to be ready
        run: |
          kubectl -n kube-system wait \
            --for=condition=available deployment/coredns \
            --timeout=90s

      - name: Load image into kind
        run: kind load docker-image ${{ env.CI_IMAGE }}

      - name: Install devnopes via Helm
        # pullPolicy=Never — image was loaded locally above, do not pull from registry.
        # cniConfMount.enabled=false — kind nodes are containers; no real /etc/cni/net.d.
        #   The tool falls back to CRD/pod detection automatically.
        run: |
          helm install devnopes ./helm \
            -n kube-system \
            --set image.repository=devnopes \
            --set image.tag=ci-test \
            --set image.pullPolicy=Never \
            --set cniConfMount.enabled=false

      - name: Wait for job to complete
        run: |
          kubectl wait -n kube-system \
            --for=condition=complete \
            job/devnopes \
            --timeout=120s

      - name: Show full job output
        if: always()
        run: kubectl logs -n kube-system -l job-name=devnopes --tail=200

      - name: Assert healthy verdict
        run: |
          kubectl logs -n kube-system -l job-name=devnopes \
            | grep "INFRASTRUCTURE IS HEALTHY"

      # ── Docker: push (tag releases only) ─────────────────────────────────────
      - name: Login to Docker Hub
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag and push release image
        # Uses the image already built and tested above.
        # github.ref_name on a tag push is the tag name verbatim (e.g. v1.0.0).
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          docker tag ${{ env.CI_IMAGE }} ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          docker tag ${{ env.CI_IMAGE }} ${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          docker push ${{ env.IMAGE_NAME }}:latest
