name: CI — Build, Test and Push

on:
  push:
    branches: [main]
    paths:
      - "diagnose.py"
      - "Dockerfile"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/ci.yml"
      - "helm/**"
      - "k8s/**"
    tags:
      - "v*"       # e.g. v1.0.0 — triggers a release build and push

# Required GitHub secrets:
#   DOCKERHUB_USERNAME  — your Docker Hub username
#   DOCKERHUB_TOKEN     — Docker Hub access token
#                         (Docker Hub → Account Settings → Security → New Access Token)
#
# Image is pushed to:  <DOCKERHUB_USERNAME>/devnopes:<tag>  and  :latest

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/devnopes
  CI_IMAGE: devnopes:ci-test

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    permissions:
      contents: write          # required to push Helm chart to gh-pages
      security-events: write   # required to upload Trivy SARIF to GitHub Security tab

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set chart version from tag
        # Strips the leading 'v' so Chart.yaml gets "1.2.3", not "v1.2.3".
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          sed -i "s/^version: .*/version: ${VERSION}/" helm/Chart.yaml
          sed -i "s/^appVersion: .*/appVersion: \"${VERSION}\"/" helm/Chart.yaml

      # ── Python dependency management via uv ──────────────────────────────────────────────
      # uv is a fast Python package manager (written in Rust).
      # It generates uv.lock (the lockfile) and installs from it.
      # This step runs in CI — NOT inside the Docker container at runtime.
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.4"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Generate / verify lockfile
        # uv lock is idempotent: no-op if pyproject.toml hasn't changed.
        # Generates uv.lock on first run; verifies it on subsequent runs.
        run: uv lock

      - name: Install dependencies (CI verification)
        # Installs exactly the versions pinned in uv.lock — no surprises.
        # This also smoke-tests that the lockfile is valid.
        run: uv sync --frozen --no-dev

      # ── Docker: build ───────────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (load into local daemon)
        # Always built and loaded locally — used by the integration test below.
        # On tag pushes this same image is tagged and pushed to Docker Hub.
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.CI_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Security: vulnerability scan ──────────────────────────────────────────
      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.CI_IMAGE }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"          # never fail the build — report only

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      # ── Integration test ───────────────────────────────────────────────────────────
      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: kind

      - name: Wait for CoreDNS to be ready
        run: |
          kubectl -n kube-system wait \
            --for=condition=available deployment/coredns \
            --timeout=90s

      - name: Load image into kind
        run: kind load docker-image ${{ env.CI_IMAGE }} --name kind

      - name: Deploy devnopes
        # helm template | kubectl apply is fully idempotent: it never fails on
        # pre-existing resources regardless of who created them or cluster state.
        # Delete the Job first because Job specs are immutable once created.
        run: |
          kubectl delete job devnopes -n kube-system --ignore-not-found=true
          helm template devnopes ./helm \
            --namespace kube-system \
            --set image.repository=devnopes \
            --set image.tag=ci-test \
            --set image.pullPolicy=Never \
            --set cniConfMount.enabled=false \
          | kubectl apply -f -

      - name: Wait for job to finish
        # Wait for Complete OR Failed — the job exits non-zero when infra issues
        # are found, which sets condition=failed not condition=complete.
        run: |
          kubectl wait -n kube-system job/devnopes \
            --for=condition=complete \
            --timeout=120s \
          || kubectl wait -n kube-system job/devnopes \
            --for=condition=failed \
            --timeout=10s

      - name: Show output and assert healthy verdict
        run: |
          LOGS=$(kubectl logs -n kube-system -l job-name=devnopes --tail=200)
          echo "$LOGS"
          echo "$LOGS" | grep "INFRASTRUCTURE IS HEALTHY"

      # ── Docker: push (tag releases only) ─────────────────────────────────────────────
      - name: Login to Docker Hub
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag and push release image
        # Uses the image already built and tested above.
        # github.ref_name on a tag push is the tag name verbatim (e.g. v1.0.0).
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          docker tag ${{ env.CI_IMAGE }} ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          docker tag ${{ env.CI_IMAGE }} ${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          docker push ${{ env.IMAGE_NAME }}:latest

      # ── Helm chart: publish to GitHub Pages ──────────────────────────────────────────
      - name: Publish Helm chart to GitHub Pages
        # Packages the chart and updates the Helm repo index on the gh-pages branch.
        # Chart.yaml version was already set by "Set chart version from tag" above.
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          # Copy root README into the chart so ArtifactHub displays it
          cp README.md helm/README.md

          # Package the chart
          helm package ./helm --destination /tmp/helm-pkg

          # Switch to gh-pages and update the repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          git checkout gh-pages

          cp /tmp/helm-pkg/devnopes-${VERSION}.tgz .
          helm repo index . --url https://seab4ng.github.io/Devnopes

          git add devnopes-${VERSION}.tgz index.yaml
          git commit -m "Release Helm chart v${VERSION}"
          git push origin gh-pages
