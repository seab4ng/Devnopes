name: CI — Build, Test and Push

on:
  push:
    branches: [main]
    paths:
      - "diagnose.py"
      - "Dockerfile"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/ci.yml"
    tags:
      - "v*"       # e.g. v1.0.0 — triggers a release build and push

# Required GitHub secrets:
#   DOCKERHUB_USERNAME  — your Docker Hub username
#   DOCKERHUB_TOKEN     — Docker Hub access token

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/devnopes
  CI_IMAGE: devnopes:ci-test

jobs:

  # ───────────────────────────────────────────────────────────────
  # Stage 1 — verify Python dependencies
  # ───────────────────────────────────────────────────────────────
  verify:
    name: Verify dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.4"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Generate / verify lockfile
        run: uv lock

      - name: Install dependencies
        run: uv sync --frozen --no-dev


  # ───────────────────────────────────────────────────────────────
  # Stage 2 — build Docker image and export as artifact
  # ───────────────────────────────────────────────────────────────
  build:
    name: Build image
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.4"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Generate lockfile for Docker build context
        run: uv lock

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.CI_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            CACHEBUST=${{ github.run_id }}

      - name: Export image as artifact
        run: docker save ${{ env.CI_IMAGE }} | gzip > ci-image.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: ci-image
          path: ci-image.tar.gz
          retention-days: 1


  # ───────────────────────────────────────────────────────────────
  # Stage 3 — security scan (runs in parallel with integration-test)
  # ───────────────────────────────────────────────────────────────
  scan:
    name: Security scan (Trivy)
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: ci-image

      - name: Load image
        run: docker load < ci-image.tar.gz

      - name: Scan for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.CI_IMAGE }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"   # report only — do not fail the build

      - name: Upload results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif


  # ───────────────────────────────────────────────────────────────
  # Stage 4 — integration test (runs in parallel with scan)
  # ───────────────────────────────────────────────────────────────
  integration-test:
    name: Integration test (kind)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: ci-image

      - name: Load image
        run: docker load < ci-image.tar.gz

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: kind

      - name: Wait for CoreDNS to be ready
        run: |
          kubectl -n kube-system wait \
            --for=condition=available deployment/coredns \
            --timeout=90s

      - name: Load image into kind
        run: kind load docker-image ${{ env.CI_IMAGE }}

      - name: Install devnopes via Helm
        # pullPolicy=Never — image loaded locally, not pulled from registry
        # cniConfMount.enabled=false — kind nodes are containers, no real /etc/cni/net.d
        run: |
          helm install devnopes ./helm \
            -n kube-system \
            --set image.repository=devnopes \
            --set image.tag=ci-test \
            --set image.pullPolicy=Never \
            --set cniConfMount.enabled=false

      - name: Wait for job to complete
        run: |
          kubectl wait -n kube-system \
            --for=condition=complete \
            job/devnopes \
            --timeout=120s

      - name: Show full job output
        if: always()
        run: kubectl logs -n kube-system -l job-name=devnopes --tail=200

      - name: Assert healthy verdict
        run: |
          kubectl logs -n kube-system -l job-name=devnopes \
            | grep "INFRASTRUCTURE IS HEALTHY"


  # ───────────────────────────────────────────────────────────────
  # Stage 5 — push to Docker Hub (tag releases only)
  # Both scan and integration-test must pass before push.
  # ───────────────────────────────────────────────────────────────
  push:
    name: Push to Docker Hub
    needs: [scan, integration-test]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: ci-image

      - name: Load image
        run: docker load < ci-image.tar.gz

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag and push release image
        # github.ref_name on a tag push is the tag verbatim (e.g. v1.0.0)
        run: |
          docker tag ${{ env.CI_IMAGE }} ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          docker tag ${{ env.CI_IMAGE }} ${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          docker push ${{ env.IMAGE_NAME }}:latest
